<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#14161c;--card:#1e212b;--card2:#262a36;--line:#2f3442;--txt:#eef1f6;--dim:#8a93a6;--dim2:#5f6776;
--ok:#2ECC71;--warn:#FF9F1C;--bad:#FF4D4D;--congelateur:#3FA9F5;--frigo:#2ECC71;--sec:#E8A23D;--bar:#B96CFF;--conso:#8A93A6;}
html,body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-text-size-adjust:100%}
body{padding-bottom:96px;max-width:560px;margin:0 auto}
.tnum{font-variant-numeric:tabular-nums}
header{position:sticky;top:0;z-index:30;background:rgba(20,22,28,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px 10px;padding-top:max(14px,env(safe-area-inset-top))}
.h-top{display:flex;align-items:baseline;justify-content:space-between}
.h-title{font-size:18px;font-weight:700;letter-spacing:.5px}.h-title span{color:var(--congelateur)}
.h-ver{font-size:11px;color:var(--dim2);font-weight:600}
.h-sub{font-size:12px;color:var(--dim);margin-top:2px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--dim);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer;transition:.15s}
.chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
.chip.on{color:var(--txt);border-color:var(--c);background:color-mix(in srgb,var(--c) 16%,var(--card))}
.chip .badge,.nbadge{background:var(--warn);color:#14161c;font-size:11px;font-weight:800;border-radius:999px;padding:1px 6px}
.wrap{padding:8px 16px 16px}
.card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--st);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.c-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.c-name{font-size:16px;font-weight:700;line-height:1.2}
.c-meta{font-size:11px;color:var(--dim);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.tag{background:var(--card2);border-radius:6px;padding:2px 7px;font-weight:600}.tag.conso{color:var(--conso)}
.st-badge{flex:0 0 auto;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;background:color-mix(in srgb,var(--st) 22%,transparent);color:var(--st);white-space:nowrap}
.counter{display:flex;align-items:center;gap:14px;margin:4px 0 12px}
.btn{flex:0 0 auto;width:56px;height:56px;border-radius:16px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .08s,background .15s}
.btn:active{transform:scale(.9)}
.btn.minus:active{background:color-mix(in srgb,var(--bad) 30%,var(--card2))}
.btn.plus:active{background:color-mix(in srgb,var(--ok) 30%,var(--card2))}
.cnt{flex:1;text-align:center}.cnt .n{font-size:40px;font-weight:800;line-height:1}.cnt .u{font-size:13px;color:var(--dim);font-weight:600;margin-top:2px}
.derived{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--dim)}
.derived b{color:var(--txt);font-weight:700}
.derived .pill{background:var(--card2);border-radius:8px;padding:5px 9px}
.thr{font-size:11px;color:var(--dim2);margin-top:9px}.thr b{color:var(--dim)}
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;background:rgba(20,22,28,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);max-width:560px;margin:0 auto}
nav button{flex:1;background:none;border:none;color:var(--dim2);padding:11px 0 13px;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
nav button .ic{font-size:21px;line-height:1}nav button.on{color:var(--congelateur)}
nav button .nbadge{position:absolute;top:6px;left:50%;margin-left:6px}
.fab{position:fixed;right:18px;bottom:84px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:45;width:56px;height:56px;border-radius:50%;background:var(--congelateur);color:#0a1a26;border:none;font-size:32px;font-weight:300;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.store-block{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.store-head{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:var(--card2);font-weight:700;font-size:15px}
.store-head .sub{font-size:12px;color:var(--warn);font-weight:700}
.ol-row{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-top:1px solid var(--line);font-size:14px}
.ol-row .q{font-weight:800;color:var(--warn)}.ol-row .qd{font-size:11px;color:var(--dim);font-weight:600}
.ol-row .pr{color:var(--dim);font-size:13px;font-variant-numeric:tabular-nums}
.grand{text-align:right;font-size:14px;color:var(--dim);padding:6px 4px 2px}.grand b{font-size:19px;color:var(--txt)}
.p-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.p-name{font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
.p-name .best{font-size:11px;color:var(--ok);font-weight:700}
.p-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.p-row label{flex:1;font-size:13px;color:var(--dim)}.p-row.win label{color:var(--ok);font-weight:700}
.p-row input{width:88px;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 10px;font-size:14px;text-align:right;font-variant-numeric:tabular-nums}
.p-row.win input{border-color:var(--ok)}.p-row .cur{color:var(--dim2);font-size:13px;width:14px}
.cta{display:block;width:100%;background:var(--congelateur);color:#0a1a26;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin:4px 0 16px}
.cta.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.cta.danger{background:transparent;color:var(--bad);border:1px solid color-mix(in srgb,var(--bad) 40%,var(--line))}
.empty{text-align:center;color:var(--dim);padding:48px 24px;font-size:14px;line-height:1.6}
.note{font-size:11px;color:var(--dim2);text-align:center;padding:4px 24px 12px;line-height:1.5}
.set-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.set-h{font-weight:700;font-size:15px;margin-bottom:6px}
.set-sub{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:10px}.set-sub b{color:var(--txt)}
.qrbox{background:#fff;border-radius:12px;padding:14px;width:200px;margin:6px auto 10px;display:flex;align-items:center;justify-content:center}
.qrbox svg{width:100%;height:auto;display:block}
.urlrow{font-size:12px;color:var(--dim);text-align:center;word-break:break-all;background:var(--card2);padding:8px;border-radius:8px}
/* login */
#login{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px}
#login .lg{font-size:22px;font-weight:800;letter-spacing:.5px}#login .lg span{color:var(--congelateur)}
#login .lsub{color:var(--dim);font-size:13px;margin-bottom:8px}
#login input{width:100%;max-width:320px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:14px;font-size:15px}
#login button{width:100%;max-width:320px;background:var(--congelateur);color:#0a1a26;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer}
#li-err{color:var(--bad);font-size:13px;min-height:18px;text-align:center}
.lver{color:var(--dim2);font-size:12px;font-weight:600;margin-top:20px;letter-spacing:.5px}
/* sheet */
#sheetwrap{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center}
#sheetwrap.open{display:flex}
#sheet{background:var(--bg);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.sh-head{position:sticky;top:0;background:var(--bg);display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;border-bottom:1px solid var(--line)}
.sh-title{font-size:17px;font-weight:700}
.sh-x{background:var(--card2);border:none;color:var(--txt);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
.sh-body{padding:14px 18px 22px}
.frow{margin-bottom:12px}.frow label,.f3 label,.frow3>label{display:block;font-size:12px;color:var(--dim);margin-bottom:5px;font-weight:600}
.frow input,.frow select,.f3 input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px;font-size:15px}
.frow3{display:flex;gap:8px;margin-bottom:12px}.f3{flex:1}
.shsep{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim2);font-weight:700;margin:18px 0 10px}
.seg{display:flex;gap:8px}.seg button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--dim);border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.seg button.on{background:color-mix(in srgb,var(--congelateur) 18%,var(--card));border-color:var(--congelateur);color:var(--txt)}
.zrow{padding:11px 0;border-top:1px solid var(--line)}
.zrow:first-of-type{border-top:none;padding-top:4px}
.zhead{display:flex;align-items:center;gap:9px}
.zdot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.zname{font-weight:700;font-size:14px}
.zcount{font-size:11px;color:var(--dim);flex:1}
.zbtn{background:var(--card2);border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:13px;flex:0 0 auto}
.zsw{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;padding-left:22px}
.sw{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid transparent;box-sizing:border-box}
.sw.on{border-color:var(--txt)}

/* guide */
#guidewrap{position:fixed;inset:0;z-index:95;background:var(--bg);overflow-y:auto;display:none}
#guidewrap.open{display:block}
.g-head{position:sticky;top:0;background:rgba(20,22,28,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top));z-index:2}
.g-title{font-size:17px;font-weight:800}.g-title span{color:var(--congelateur)}
.g-x{background:var(--card2);border:1px solid var(--line);color:var(--txt);width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;flex:0 0 auto}
.g-body{padding:14px 18px 70px;max-width:560px;margin:0 auto}
.g-h2{font-size:18px;font-weight:800;margin:26px 0 6px;padding-top:16px;border-top:1px solid var(--line)}
.g-h2 .n{color:var(--congelateur)}
.g-h3{font-size:15px;font-weight:700;margin:16px 0 4px}
.g-body p{font-size:14px;color:#dfe4ee;margin:7px 0;line-height:1.55}
.g-body ul,.g-body ol{margin:6px 0 6px 20px;font-size:14px}
.g-body li{margin:5px 0;line-height:1.5}
.g-body b{color:#fff}
.g-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:12px 0;font-size:14px;line-height:1.55}
.g-card.gold{border-left:4px solid #9BE84B}
.g-card.warn{border-left:4px solid var(--warn)}
.g-card.info{border-left:4px solid var(--congelateur)}
.g-k{background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:0 7px;font-weight:700;white-space:nowrap}
.g-plus{color:var(--ok)}.g-minus{color:var(--bad)}
.g-z{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border-radius:999px;padding:5px 11px;margin:3px 5px 3px 0;font-size:13px;font-weight:600}
.g-zdot{width:9px;height:9px;border-radius:50%}
.g-dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:5px}
.g-body table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.g-body th,.g-body td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.g-body th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.4px}

/* prix accordéons */
.acc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.acc-head{display:flex;align-items:center;gap:9px;padding:13px 15px;cursor:pointer;font-weight:700;font-size:15px}
.acc-body{padding:0 14px 6px}
.chev{margin-left:auto;color:var(--dim);transition:transform .15s;font-size:18px;line-height:1;display:inline-block}
.acc.open>.acc-head .chev{transform:rotate(90deg)}
.chev.o{transform:rotate(90deg)}
.pacc{border-top:1px solid var(--line)}
.pacc-head{display:flex;align-items:center;gap:8px;padding:11px 2px;cursor:pointer;font-size:14px;font-weight:600}
.pacc-head .chev{margin-left:8px}
.psum{margin-left:auto;font-size:12px;color:var(--dim);font-weight:600;white-space:nowrap}
.psum.has{color:var(--ok)}
.mrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
.mrow:first-of-type{border-top:none}
.mname{flex:1;font-weight:600;font-size:14px}
.ol-row .cmd-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.ol-row .cmd-states{display:flex;gap:4px;flex:none}
.cs{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);background:transparent;cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,color .15s;color:var(--dim2);font-family:inherit}
.cs:hover{border-color:var(--dim);color:var(--dim)}
.cs.act{color:var(--txt)}
.cs[data-cmd="todo"].act{background:color-mix(in srgb,var(--warn) 16%,var(--card));border-color:var(--warn);color:var(--warn)}
.cs[data-cmd="ordered"].act{background:color-mix(in srgb,#B96CFF 18%,var(--card));border-color:#B96CFF;color:#D3B3FF}
.cs[data-cmd="received"].act{background:color-mix(in srgb,var(--ok) 18%,var(--card));border-color:var(--ok);color:var(--ok)}
</style>
</head>
<body>
<header>
  <div class="h-top"><div class="h-title">LUMI<span>IA</span> · Stock</div><div class="h-ver" id="ver"></div></div>
  <div class="h-sub" id="hsub">Compte ce que tu as. L'appli calcule le reste.</div>
</header>
<div id="view"></div>
<button class="fab" id="fab">+</button>
<nav>
  <button data-tab="stock" class="on"><span class="ic">📦</span>Stock</button>
  <button data-tab="commande"><span class="ic">🛒</span>Commande</button>
  <button data-tab="prix"><span class="ic">🏷️</span>Prix</button>
  <button data-tab="reglages"><span class="ic">⚙️</span>Réglages</button>
</nav>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],

    const title=m==='__none__'?'— magasin non défini':esc(magName(m));
    html+='<div class="store-block"><div class="store-head">'+title+'<span class="sub">'+(sub?F(sub)+' €':'')+'</span></div>'+rows+'</div>';
  }
  html+='<div class="grand">Total estimé : <b class="tnum">'+F(grand)+' €</b></div></div>';
  v.innerHTML=html;
}

function renderPrix(){
  const v=document.getElementById('view');
  const mags=Object.entries(state.magasins).sort((a,b)=>(''+a[1]).localeCompare(''+b[1]));
  let html='<div class="wrap">';
  html+='<div class="acc'+(magOpen?' open':'')+'"><div class="acc-head" data-magacc="1">Magasins<span class="zcount">'+mags.length+'</span><span class="chev">›</span></div>';
  if(magOpen){
    html+='<div class="acc-body" style="padding-bottom:12px">';
  if(!mags.length) html+='<div class="set-sub">Aucun magasin pour l\'instant.</div>';
  for(const [k,n] of mags){
    html+='<div class="mrow"><span class="mname">'+esc(n)+'</span>'
      +'<button class="zbtn" data-mact="rename" data-mag="'+k+'">✎</button>'
      +'<button class="zbtn" data-mact="del" data-mag="'+k+'">🗑</button></div>';
  }
    html+='<button class="cta ghost" data-act="addmag" style="margin-top:12px">+ Ajouter un magasin</button></div>';
  }
  html+='</div>';
  if(!prodList().length){ v.innerHTML=html+'<div class="empty">Crée d\'abord des produits.</div></div>'; return; }
  for(const [zk,zo] of lieuxSorted()){
    const prods=prodList().filter(p=>p.lieu===zk).sort((a,b)=>a.nom.localeCompare(b.nom));
    if(!prods.length) continue;
    const open=prixOpenZones.has(zk);
    html+='<div class="acc'+(open?' open':'')+'"><div class="acc-head" data-zone="'+zk+'">'
      +'<span class="zdot" style="background:'+zo.color+'"></span>'+esc(zo.nom)
      +'<span class="zcount">'+prods.length+'</span><span class="chev">›</span></div>';
    if(open){
      html+='<div class="acc-body">';
      for(const p of prods){
        const best=moinsCher(p.id), bestPr=best?(state.prix[p.id]||{})[best]:null, popen=prixOpenProd===p.id;
        const sum=best?'<span class="psum has">'+esc(magName(best))+' '+F(bestPr)+' €</span>':'<span class="psum">— prix</span>';
        html+='<div class="pacc"><div class="pacc-head" data-prod="'+p.id+'"><span>'+esc(p.nom)+'</span>'+sum+'<span class="chev'+(popen?' o':'')+'">›</span></div>';
        if(popen){
          if(!mags.length) html+='<div class="thr">Ajoute un magasin d\'abord.</div>';
          for(const [k,n] of mags){
            const val=(state.prix[p.id]||{})[k];
            html+='<div class="p-row '+(k===best?'win':'')+'"><label>'+esc(n)+'</label>'
              +'<input type="number" inputmode="decimal" step="0.01" placeholder="—" value="'+(val!=null?val:'')+'" data-prix="'+p.id+'" data-mag="'+k+'"><span class="cur">€</span></div>';
          }
          html+='<div class="thr">Prix par '+esc(p.uniteStock)+'</div>';
        }
        html+='</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  v.innerHTML=html+'</div>';
}

window.addLieu=async()=>{
  const n=prompt('Nom de la zone ? (ex : Cave, Réserve, Bar 2)'); if(!n||!n.trim())return;
  let key=n.trim().toLowerCase().normalize('NFD').replace(/[^a-z0-9]/g,''); if(!key)key='zone';
  if(LIEUX[key])key+=Math.floor(Math.random()*900+100);
  const used=Object.values(LIEUX).map(z=>(z.color||'').toLowerCase());
  const color=ZONE_PALETTE.find(c=>!used.includes(c.toLowerCase()))||ZONE_PALETTE[Object.keys(LIEUX).length%ZONE_PALETTE.length];
  const order=Math.max(0,...Object.values(LIEUX).map(z=>+z.order||0))+1;
  await set(ref(db,'stock/lieux/'+key),{nom:n.trim(),color,order});
};
window.renameLieu=async(k)=>{
  const cur=(LIEUX[k]||{}).nom||''; const n=prompt('Nouveau nom de la zone :',cur);
  if(!n||!n.trim()||n.trim()===cur)return;
  await set(ref(db,'stock/lieux/'+k+'/nom'),n.trim());
};
window.setLieuColor=async(k,c)=>{ await set(ref(db,'stock/lieux/'+k+'/color'),c); };
window.deleteLieu=async(k)=>{
  const n=prodList().filter(p=>p.lieu===k).length;
  if(n>0){ alert('Cette zone contient '+n+' produit'+(n>1?'s':'')+'. Déplace-les ou supprime-les d\'abord.'); return; }
  if(Object.keys(LIEUX).length<=1){ alert('Garde au moins une zone.'); return; }
  if(!confirm('Supprimer la zone « '+((LIEUX[k]||{}).nom||'')+' » ?'))return;
  await remove(ref(db,'stock/lieux/'+k));
  if(LIEU===k){ const f=lieuxSorted().find(([kk])=>kk!==k); if(f)LIEU=f[0]; }
};

window.deleteMag=async(k)=>{
  if(!confirm('Supprimer le magasin « '+(state.magasins[k]||'')+' » ? Les prix saisis pour ce magasin seront effacés.'))return;
  const upd={}; upd['stock/magasins/'+k]=null;
  for(const id in (state.prix||{})){ if(state.prix[id] && state.prix[id][k]!=null) upd['stock/prix/'+id+'/'+k]=null; }

};
function fld(lab,id,type,val){return '<div class="frow"><label>'+lab+'</label><input id="'+id+'" type="'+type+'" '+(type==='number'?'inputmode="decimal" step="any" ':'')+'value="'+esc(val)+'"></div>';}
function fld3(lab,id,val){return '<div class="f3"><label>'+lab+'</label><input id="'+id+'" type="number" inputmode="numeric" value="'+esc(val)+'"></div>';}
window.closeSheet=()=>{sheetOpen=false;document.getElementById('sheetwrap').classList.remove('open');};
window.saveProduct=async(id)=>{
  const g=i=>document.getElementById(i).value;
  const nom=g('f-nom').trim(); if(!nom){alert('Donne un nom au produit.');return;}
  const carte=document.getElementById('sheet').dataset.carte==='1';
  const num=v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
  const obj={nom,lieu:g('f-lieu'),carte,
    uniteStock:g('f-unite').trim()||'unité',
    base:g('f-base').trim()||g('f-unite').trim()||'unité',
    parUnite:num(g('f-par'))||1,
    stock:num(g('f-stock'))||0, mini:num(g('f-mini'))||0, normal:num(g('f-normal'))||0};
  const pn=g('f-pnom').trim(), pb=num(g('f-pbase')), kg=num(g('f-kg'));
  if(pn&&pb){obj.portionNom=pn;obj.portionBase=pb;}
  if(kg)obj.kgParUnite=kg;
  const mag=g('f-magasin'); if(mag)obj.magasin=mag;
  let key=id;
  if(!key){key=nom.toLowerCase().normalize('NFD').replace(/[^a-z0-9]/g,'').slice(0,24)||'p';
    if(state.produits[key])key+=Math.floor(Math.random()*900+100);}
  await set(ref(db,'stock/produits/'+key),obj);
  closeSheet();
};
window.deleteProduct=async(id)=>{
  if(!confirm('Supprimer ce produit ?'))return;
  await remove(ref(db,'stock/produits/'+id));
  await remove(ref(db,'stock/prix/'+id));
  closeSheet();
};

// ---------- EVENTS (délégation) ----------
document.getElementById('view').addEventListener('click',e=>{
  const cmd=e.target.closest('[data-cmd]');
  if(cmd){e.stopPropagation();
    const pid=cmd.dataset.pid, etat=cmd.dataset.cmd;
    const cmdRef=ref(db,'stock/commandes/'+pid);
    const prod=state.produits[pid];
    if(!prod){return;}
    if(etat==='todo'){
      // retour à "à commander" → supprime l'entrée
      set(cmdRef,null).catch(()=>{});
    } else if(etat==='ordered'){
      // marqué comme commandé → mémorise quantité + magasin
      set(cmdRef,{etat:'ordered',quantite:+cmd.dataset.qty,magasin:cmd.dataset.mag||null,modifAt:Date.now()}).catch(()=>{});
    } else if(etat==='received'){
      // reçu → +qte au stock + supprime l'entrée
      const stored=state.commandes[pid];
      const qte=stored&&stored.quantite!=null?+stored.quantite:+cmd.dataset.qty;
      const nouveauStock=(+prod.stock||0)+qte;
      update(ref(db,'stock/produits/'+pid),{stock:nouveauStock}).then(()=>set(cmdRef,null)).catch(()=>{});
    }
    return;
  }
  const bump=e.target.closest('[data-bump]');
  if(bump){e.stopPropagation();window.bump(bump.dataset.bump,+bump.dataset.d);return;}
  const zact=e.target.closest('[data-zact]');
  if(zact){const a=zact.dataset.zact,k=zact.dataset.lieu;
    if(a==='rename')window.renameLieu(k);
    else if(a==='del')window.deleteLieu(k);
    else if(a==='color')window.setLieuColor(k,zact.dataset.color);
    return;}
  const chip=e.target.closest('[data-lieu]');
  if(chip){LIEU=chip.dataset.lieu;renderStock();return;}
  const edit=e.target.closest('[data-edit]');
  if(edit){window.openSheet(edit.dataset.edit);return;}
  const zacc=e.target.closest('[data-zone]');
  if(zacc){const k=zacc.dataset.zone; prixOpenZones.has(k)?prixOpenZones.delete(k):prixOpenZones.add(k); renderPrix(); return;}
  const pacc=e.target.closest('[data-prod]');
  if(pacc){const id=pacc.dataset.prod; prixOpenProd=(prixOpenProd===id?null:id); renderPrix(); return;}
  const mact=e.target.closest('[data-mact]');
  if(mact){const a=mact.dataset.mact; if(a==='rename')window.renameMag(mact.dataset.mag); else if(a==='del')window.deleteMag(mact.dataset.mag); return;}
  const magacc=e.target.closest('[data-magacc]');
  if(magacc){magOpen=!magOpen; renderPrix(); return;}
  const act=e.target.closest('[data-act]');
  if(act){const a=act.dataset.act;
    if(a==='addmag')window.addMag();
    else if(a==='logout')window.doLogout();
    else if(a==='seed')window.seedDemo();
    else if(a==='addzone')window.addLieu();
    else if(a==='guide')window.openGuide();}
});
document.getElementById('view').addEventListener('change',e=>{
  const px=e.target.closest('[data-prix]');
  if(px)window.setPrix(px.dataset.prix,px.dataset.mag,px.value);
});
document.getElementById('sheetwrap').addEventListener('click',e=>{
  if(e.target.id==='sheetwrap'){window.closeSheet();return;}
  const seg=e.target.closest('[data-seg]');
  if(seg){const on=seg.dataset.seg;document.getElementById('sheet').dataset.carte=on;
    document.getElementById('f-carte-1').classList.toggle('on',on==='1');
    document.getElementById('f-carte-0').classList.toggle('on',on==='0');return;}
  const act=e.target.closest('[data-act]');
  if(act){const a=act.dataset.act;
    if(a==='closesheet')window.closeSheet();
    else if(a==='saveprod')window.saveProduct(act.dataset.id);
    else if(a==='delprod')window.deleteProduct(act.dataset.id);}
});
document.getElementById('guidewrap').addEventListener('click',e=>{
  if(e.target.id==='guidewrap'||e.target.closest('[data-act="closeguide"]'))window.closeGuide();
});
document.getElementById('fab').addEventListener('click',()=>window.openSheet());
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>{TAB=b.dataset.tab;render();}));
